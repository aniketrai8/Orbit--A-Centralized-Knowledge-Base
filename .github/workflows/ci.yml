name: Orbit- Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:

steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Unit Tests
        run: ./gradlew test --info --stacktrace

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Integration Tests
        run: ./gradlew integrationTest --info --stacktrace
